name: ather_wallet
description: "Ather Wallet - Premium Personal Finance Tracker"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.69.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.5
  shared_preferences: ^2.2.3

  # Security
  local_auth: ^2.3.0

  # Notifications
  flutter_local_notifications: ^17.2.4
  table_calendar: ^3.1.3
  csv: ^8.0.0
  share_plus: 12.0.2
  image_picker: ^1.2.2
  file_picker: 11.0.2
  google_mlkit_text_recognition: ^0.13.1
  pdf: ^3.12.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
